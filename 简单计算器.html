<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>简易网页计算器</title>
</head>
<body>
    <h1 style="color: red;">简易网页计算器</h1>
    <label for="num1">操作数一：</label>
    <input type="text" id="num1"><br><br>
    <label for="num2">操作数二：</label>
    <input type="text" id="num2"><br><br>
    <label for="result">计算结果：</label>
    <input type="text" id="result" readonly><br><br>
    <button onclick="calculate('add')">加</button>
    <button onclick="calculate('subtract')">减</button>
    <button onclick="calculate('multiply')">乘</button>
    <button onclick="calculate('divide')">除</button>
    <button onclick="resetCalculator()">重置</button>
    <!--修改  -->
    <script>
        function calculate(operation) {
            let num1 = parseFloat(document.getElementById('num1').value);
            let num2 = parseFloat(document.getElementById('num2').value);
            let result;
            switch (operation) {
                case 'add':
                    result = num1 + num2;
                    break;
                case 'subtract':
                    result = num1 - num2;
                    break;
                case 'multiply':
                    result = num1 * num2;
                    break;
                case 'divide':
                    if (num2 === 0) {
                        result = '除数不能为0';
                    } else {
                        result = num1 / num2;
                    }
                    break;
            }
            document.getElementById('result').value = result;
        }
        function resetCalculator() {
            document.getElementById('num1').value = '';
            document.getElementById('num2').value = '';
            document.getElementById('result').value = '';
        }
        // 修改2
    </script>
</body>
</html>
